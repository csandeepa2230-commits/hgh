  <style>
    *{
      margin:0;
      padding:0;

    body{
      background: linear-gradient(to bottom, #00000f, #003366);
      color:white;
      text-align:center;
    }

    header{
      padding:40px 20px;
    }

    header h1{
      font-size:50px;

      text-shadow:0 0 15px #ffd700;
    }

    header p{

    }

    .lanterns{
      display:flex;
      justify-content:center;
      gap:30px;
      margin-top:40px;
      flex-wrap:wrap;
    }

    .lantern{
      width:120px;
      height:120px;
      background:white;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      animation: glow 2s infinite alternate;
      box-shadow:0 0 20px white;
    }

    .lantern:nth-child(2){
      background:#ff4d4d;
      box-shadow:0 0 20px #ff4d4d;
    }

    .lantern:nth-child(3){
      background:#00ffff;
      box-shadow:0 0 20px #00ffff;
    }

    @keyframes glow{
      from{
        transform:scale(1);
        opacity:0.7;
      }

      to{
        transform:scale(1.1);
        opacity:1;
      }
    }

    .content{
      margin-top:50px;
      padding:20px;
    }

    .btn{
      display:inline-block;
      margin-top:20px;
      padding:12px 25px;
      background:#ffd700;
      color:black;
      text-decoration:none;
      border-radius:30px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      background:white;
      transform:scale(1.1);
    }

    footer{
      margin-top:60px;
      padding:20px;
      background:#00000055;
    }
